<div #svgContainer class="topology-container" [class.dimmed]="isDimmed()">
  <canvas #particlesCanvas class="topology-particles" aria-hidden="true"></canvas>
  @if (showVoteStats() && effectiveSkipVotes > 0) {
    <div class="skip-badge">
      <span class="skip-dot"></span>
      {{ effectiveSkipVotes }} abstención(es)
    </div>
  }

  <svg [attr.width]="width" [attr.height]="height" class="topology-svg">
    <defs>
      <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <linearGradient id="hub-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.9" />
        <stop offset="100%" stop-color="#0066aa" stop-opacity="0.6" />
      </linearGradient>
      <linearGradient id="link-active" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.55" />
        <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.15" />
      </linearGradient>
      <radialGradient id="hub-radial" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#00f0ff33" />
        <stop offset="100%" stop-color="#00000000" />
      </radialGradient>
    </defs>

    <!-- Anillo exterior decorativo -->
    <circle
      class="orbit-ring"
      [attr.cx]="hub.x"
      [attr.cy]="hub.y"
      [attr.r]="Math.min(width, height) / 2 - 72"
    />

    <!-- Enlaces al hub -->
    @for (link of hubLinks; track link.id) {
      <line
        class="hub-link"
        [class.hub-link-active]="link.active"
        [attr.x1]="link.x1"
        [attr.y1]="link.y1"
        [attr.x2]="link.x2"
        [attr.y2]="link.y2"
      />
    }

    <!-- Hub central (firewall) -->
    <g class="hub" [attr.transform]="'translate(' + hub.x + ',' + hub.y + ')'">
      <circle r="72" class="hub-aura" />
      <circle r="62" class="hub-orbit" />
      <polygon points="0,-40 34,20 -34,20" class="hub-shield" />
      <circle r="26" class="hub-core" />
      <text y="7" text-anchor="middle" class="hub-label">FW</text>
    </g>

    <!-- Nodos jugador -->
    @for (node of nodes; track node.id) {
      <g
        [ngClass]="nodeClasses(node.player)"
        [class.glitch]="isGlitching(node.id)"
        [attr.transform]="'translate(' + node.x + ',' + node.y + ')'"
        filter="url(#node-glow)"
      >
        <polygon
          class="node-hex node-hex-outer"
          [attr.points]="hexPoints(nodeMetrics.outer)"
        />
        <polygon
          class="node-hex node-hex-inner"
          [attr.points]="hexPoints(nodeMetrics.inner)"
        />
        <text
          y="6"
          text-anchor="middle"
          dominant-baseline="middle"
          class="node-initial"
          [attr.font-size]="nodeMetrics.initialSize"
        >
          {{ node.player.name.charAt(0).toUpperCase() }}
        </text>

        @if (nodeStatusLabel(node.player); as label) {
          <rect
            class="node-tag-bg"
            [attr.x]="-statusLabelWidth(label) / 2"
            [attr.y]="nodeMetrics.statusY - 11"
            [attr.width]="statusLabelWidth(label)"
            height="18"
            rx="4"
          />
          <text
            [attr.y]="nodeMetrics.statusY"
            text-anchor="middle"
            dominant-baseline="middle"
            class="node-status"
            [attr.font-size]="nodeMetrics.statusSize"
            [class.dead]="!node.player.isAlive"
            [class.offline]="node.player.isAlive && !node.player.isConnected"
            [class.silenced]="node.player.silenced && node.player.isAlive"
          >{{ label }}</text>
        }

        @if (showRole(node.player)) {
          <text
            [attr.y]="nodeMetrics.roleY"
            text-anchor="middle"
            dominant-baseline="middle"
            class="node-role"
            [attr.font-size]="nodeMetrics.roleSize"
          >{{ node.player.role }}</text>
        }

        <rect
          class="node-name-bg"
          [attr.x]="-Math.max(node.player.name.length * 5.5, 48) / 2"
          [attr.y]="nodeMetrics.nameY - 11"
          [attr.width]="Math.max(node.player.name.length * 5.5, 48)"
          height="18"
          rx="4"
        />
        <text
          [attr.y]="nodeMetrics.nameY"
          text-anchor="middle"
          dominant-baseline="middle"
          class="node-name"
          [attr.font-size]="nodeMetrics.nameSize"
        >{{ node.player.name }}</text>

        @if (isNodeHealthy(node.player)) {
          <circle [attr.r]="nodeMetrics.pulseR" class="node-pulse-ring" />
        }
      </g>
    }
  </svg>

  @if (!nodes.length) {
    <div class="empty-state">
      <div class="empty-icon">◎</div>
      <p>Esperando nodos en la red...</p>
      <p class="hint">Los jugadores aparecerán al unirse con el código de sala</p>
    </div>
  }
</div>
