<div #svgContainer class="topology-container" [class.dimmed]="isDimmed()">
  <svg [attr.width]="width" [attr.height]="height" class="topology-svg">
    <!-- Conexiones al hub central -->
    @for (node of nodes; track node.id) {
      <line
        class="hub-link"
        [attr.x1]="width / 2"
        [attr.y1]="height / 2"
        [attr.x2]="node.x"
        [attr.y2]="node.y"
      />
    }

    <!-- Hub central (firewall) -->
    <g class="hub" [attr.transform]="'translate(' + width / 2 + ',' + height / 2 + ')'">
      <circle r="36" class="hub-ring" />
      <circle r="24" class="hub-core" />
      <text y="5" text-anchor="middle" class="hub-label">FW</text>
    </g>

    <!-- Nodos jugador -->
    @for (node of nodes; track node.id) {
      <g
        class="player-node"
        [class]="nodeClass(node.player)"
        [class.glitch]="isGlitching(node.id)"
        [attr.transform]="'translate(' + node.x + ',' + node.y + ')'"
      >
        <circle r="28" class="node-ring animate-pulse-glow" />
        <circle r="20" class="node-core" />
        <text y="4" text-anchor="middle" class="node-initial">
          {{ node.player.name.charAt(0).toUpperCase() }}
        </text>
        <text y="42" text-anchor="middle" class="node-name">{{ node.player.name }}</text>
        @if (!node.player.isAlive) {
          <text y="-36" text-anchor="middle" class="node-status dead">BANEADO</text>
        }
      </g>
    }
  </svg>

  @if (!nodes.length) {
    <div class="empty-state">
      <p>Esperando nodos en la red...</p>
      <p class="hint">Los jugadores aparecerán al unirse con el código de sala</p>
    </div>
  }
</div>
