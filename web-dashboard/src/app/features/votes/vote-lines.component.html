<svg
  #container
  class="vote-lines-svg"
  [class.hidden]="!visible"
  [class.vote-tie-active]="voteTied && visible">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00ff88" opacity="0.8" />
    </marker>
    <marker id="arrowhead-skip" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffd000" opacity="0.7" />
    </marker>
  </defs>

  @for (line of skipLines; track line.from) {
    <line
      class="vote-line vote-line-skip"
      [class.vote-line-pulse]="isHighlighted(line)"
      [attr.x1]="line.x1"
      [attr.y1]="line.y1"
      [attr.x2]="line.x2"
      [attr.y2]="line.y2"
      [attr.stroke-width]="line.strokeWidth"
      marker-end="url(#arrowhead-skip)"
    />
    
    <!-- Laser particle for skip vote -->
    <circle r="3" class="vote-laser-particle" fill="#ffd000" filter="drop-shadow(0 0 6px #ffd000)">
      <animate attributeName="cx" [attr.values]="line.x1 + ';' + line.x2" dur="0.4s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1" />
      <animate attributeName="cy" [attr.values]="line.y1 + ';' + line.y2" dur="0.4s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1" />
      <animate attributeName="opacity" values="0;1;0" dur="0.4s" fill="freeze" keyTimes="0;0.1;1" />
    </circle>
  }

  @for (line of lines; track line.from + '-' + line.to) {
    <line
      class="vote-line"
      [class.vote-line-pulse]="isHighlighted(line)"
      [attr.x1]="line.x1"
      [attr.y1]="line.y1"
      [attr.x2]="line.x2"
      [attr.y2]="line.y2"
      [attr.stroke-width]="line.strokeWidth"
      marker-end="url(#arrowhead)"
    />
    
    <!-- Laser particle for M27 -->
    <circle r="3" class="vote-laser-particle">
      <animate attributeName="cx" [attr.values]="line.x1 + ';' + line.x2" dur="0.4s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1" />
      <animate attributeName="cy" [attr.values]="line.y1 + ';' + line.y2" dur="0.4s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1" />
      <animate attributeName="opacity" values="0;1;0" dur="0.4s" fill="freeze" keyTimes="0;0.1;1" />
    </circle>
  }
</svg>
