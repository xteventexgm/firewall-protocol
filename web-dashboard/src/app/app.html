<div class="dashboard h-screen w-screen flex overflow-hidden bg-cyber-bg">
  <app-lobby
    class="shrink-0"
    [roomCode]="roomCode"
    [state]="state"
    [connected]="connected"
    (createLobby)="onCreateLobby($event)"
    (startGame)="onStartGame()"
    (advancePhase)="onAdvancePhase()"
  />

  <main class="main-stage flex-1 relative overflow-hidden">
    <div class="grid-bg absolute inset-0 pointer-events-none"></div>

    <app-topology
      class="absolute inset-0"
      [state]="state"
      [phase]="state?.phase ?? 'LOBBY'"
      [glitchPlayerIds]="glitchPlayerIds"
    />

    <app-vote-lines
      [state]="state"
      [phase]="state?.phase ?? 'LOBBY'"
    />

    <app-phase-overlay
      [phase]="state?.phase ?? 'LOBBY'"
      [phaseFlash]="phaseFlash"
      [incidents]="incidents"
      [showIncidentReport]="showIncidentReport"
      [incidentNightNumber]="incidentNightNumber"
    />

    @if (showGameOver && gameOverSummary) {
      <app-game-over-overlay
        [summary]="gameOverSummary"
        (exitRoom)="onExitRoom()"
      ></app-game-over-overlay>
    }

    @if (errorMessage) {
      <div class="error-toast">{{ errorMessage }}</div>
    }

    @if (voteTiedMessage) {
      <div class="vote-tied-toast">{{ voteTiedMessage }}</div>
    }
  </main>
</div>
