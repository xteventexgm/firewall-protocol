services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firewall-protocol-backend
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DOCKER: "1"
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      # MongoDB Atlas — inyectadas desde .env del host
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-firewall_protocol}
      MONGO_DNS_SERVERS: ${MONGO_DNS_SERVERS:-8.8.8.8,1.1.1.1}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:-}
      JWT_ACCESS_TTL_SEC: ${JWT_ACCESS_TTL_SEC:-86400}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-90}
      # Cloudflare R2 — inyectadas desde .env del host
      AVATAR_STORAGE: ${AVATAR_STORAGE:-r2}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-avatars}
      S3_REGION: ${S3_REGION:-auto}
      LOG_LEVEL: ${LOG_LEVEL:-info}
