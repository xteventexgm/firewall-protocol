services:
  mongodb:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:18
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      MONGO_URI: mongodb://mongodb:27017/firewall_protocol
      MONGO_DB_NAME: firewall_protocol
    depends_on:
      mongodb:
        condition: service_healthy
    command: sh -c "npm install --silent && npm run dev"

volumes:
  mongodb_data:
