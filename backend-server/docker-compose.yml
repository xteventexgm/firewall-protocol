
version: '3.8'
services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  backend:
    image: node:18
    working_dir: /usr/src/app
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      MONGO_URI: mongodb://mongodb:27017/firewall_protocol
      MONGO_DB_NAME: firewall_protocol
      JWT_SECRET: dev-firewall-protocol-change-in-production
      AVATAR_STORAGE: minio
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: avatars
    command: sh -c "npm install --silent && npm run db:setup && npm run dev"

volumes:
  mongo_data:
  minio_data:
