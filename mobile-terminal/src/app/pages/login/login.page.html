<ion-content class="login-content scroll-page" [scrollY]="false" [fullscreen]="true">
  <div class="page-scroll">
  <div class="login-shell">

    <header class="login-header">
      <div class="logo-glow">FW_PROTO</div>
      <p class="login-subtitle">Terminal de acceso cliente</p>
      <div class="conn-status">
        <span class="conn-dot" [class.online]="connected" [class.offline]="!connected"></span>
        <span>{{ connected ? 'Servidor en línea' : 'Sin conexión' }}</span>
      </div>
    </header>

    <section class="login-panel">
      <div class="field">
        <label class="field-label">> Cód. de red [SALA]</label>
        <input
          type="text"
          [(ngModel)]="roomCode"
          (keyup.enter)="joinNetwork()"
          class="terminal-input"
          placeholder="Ej. FIRE-XXXX"
          [disabled]="connecting"
          autocomplete="off"
          autocapitalize="characters">
      </div>

      <div class="field">
        <label class="field-label">> Hostname [Jugador]</label>
        <input
          type="text"
          [(ngModel)]="playerName"
          (keyup.enter)="joinNetwork()"
          class="terminal-input"
          placeholder="Tu alias / nickname"
          [disabled]="connecting"
          autocomplete="off">
      </div>

      <div *ngIf="errorMessage" class="error-banner">
        <span>></span> {{ errorMessage }}
      </div>

      <button
        (click)="joinNetwork()"
        [disabled]="connecting || !roomCode.trim() || !playerName.trim()"
        class="login-btn">
        <span *ngIf="!connecting">Ejecutar conexión</span>
        <span *ngIf="connecting" class="connecting-text">Estableciendo enlace...</span>
      </button>
    </section>

    <footer class="login-footer">
      <p>A la espera de un apretón de manos TCP...</p>
      <p>Sistema operativo: seguro</p>
    </footer>

  </div>
  </div>
</ion-content>
