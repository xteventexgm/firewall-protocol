<ion-content class="bg-slate-900">
  <div class="flex flex-col h-full p-4 font-mono bg-slate-900 text-slate-200">
    
    <div class="flex justify-between items-center border-b border-slate-700 pb-3 mb-6">
      <div>
        <p class="text-xs text-slate-400">Usuario Activo</p>
        <p class="text-emerald-500 font-bold tracking-wider">{{ playerName }}</p>
      </div>
      <div class="text-right">
        <p class="text-xs text-slate-400">Fase del Sistema</p>
        <p class="font-bold tracking-wider" 
           [ngClass]="{'text-blue-400': gamePhase === 'DAY', 'text-red-500 animate-pulse': gamePhase === 'NIGHT'}">
          {{ gamePhase === 'NIGHT' ? 'OPERACIÓN NOCTURNA' : 'AUDITORÍA DIURNA' }}
        </p>
      </div>
    </div>

    <div class="bg-slate-800 border border-slate-600 p-4 rounded-md mb-6 shadow-lg">
      <h2 class="text-xs text-slate-400 uppercase mb-1">Nivel de Acceso (Rol):</h2>
      <p class="text-2xl font-bold text-white tracking-widest">{{ playerRole }}</p>
    </div>

    <div *ngIf="gamePhase === 'NIGHT'" class="flex-1">
      <div class="border border-red-900 bg-red-950/30 p-5 rounded-md h-full">
        <h3 class="text-red-400 font-bold mb-4 uppercase">> Seleccionar Objetivo:</h3>
        
        <select 
          [(ngModel)]="selectedTarget"
          class="w-full bg-slate-900 border border-slate-600 text-slate-200 p-3 rounded focus:outline-none focus:border-red-500 mb-6 appearance-none">
          <option value="" disabled selected>-- Desplegar Nodos Activos --</option>
          <option *ngFor="let player of alivePlayers" [value]="player">
            IP: {{ player }}
          </option>
        </select>

        <button 
          (click)="executeAction()"
          [disabled]="!selectedTarget"
          class="w-full bg-red-600 hover:bg-red-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-bold uppercase py-4 rounded transition-colors">
          Confirmar Comando
        </button>
      </div>
    </div>

  </div>
</ion-content>
