<div class="encyclopedia-overlay">
  <div class="encyclopedia-container">
    <div class="header">
      <div class="header-top">
        <h2 class="title">Enciclopedia de Roles</h2>
        <button class="close-btn" (click)="close()">
          <lucide-icon name="x" class="icon-sm"></lucide-icon>
        </button>
      </div>
      
      <div class="search-bar">
        <lucide-icon name="search" class="search-icon"></lucide-icon>
        <input 
          type="text" 
          placeholder="Buscar rol o habilidad..." 
          [ngModel]="searchTerm" 
          (ngModelChange)="onSearchChange({detail: {value: $event}})"
          class="search-input"
        >
      </div>

      <div class="team-filters">
        <button 
          class="filter-btn filter-all" 
          [class.active]="selectedTeam === 'all'" 
          (click)="setTeamFilter('all')">Todos</button>
        <button 
          class="filter-btn filter-system" 
          [class.active]="selectedTeam === 'system'" 
          (click)="setTeamFilter('system')">System</button>
        <button 
          class="filter-btn filter-hacker" 
          [class.active]="selectedTeam === 'black_hat'" 
          (click)="setTeamFilter('black_hat')">Hackers</button>
        <button 
          class="filter-btn filter-chaos" 
          [class.active]="selectedTeam === 'chaotic'" 
          (click)="setTeamFilter('chaotic')">Caóticos</button>
      </div>
    </div>

    <ion-content class="roles-list-content" [scrollY]="true">
      <div class="roles-list">
        <div 
          class="role-card" 
          *ngFor="let role of filteredRoles" 
          [ngClass]="'team-' + role.team + (expandedRole === role.id ? ' expanded' : '')"
          (click)="toggleExpand(role)"
        >
          <div class="card-header">
            <div class="role-icon-wrap" [ngClass]="'glow-' + role.team">
              <lucide-icon *ngIf="role.team === 'system'" name="shield-check" class="role-icon"></lucide-icon>
              <lucide-icon *ngIf="role.team === 'black_hat'" name="skull" class="role-icon"></lucide-icon>
              <lucide-icon *ngIf="role.team === 'chaotic'" name="shuffle" class="role-icon"></lucide-icon>
            </div>
            <div class="role-info">
              <div class="role-title-row">
                <h3 class="role-name">{{ role.displayName }}</h3>
                <div class="played-badge" *ngIf="hasPlayed(role.id)">
                  <lucide-icon name="star" class="star-icon"></lucide-icon>
                  <span>Jugado</span>
                </div>
              </div>
              <p class="role-desc">{{ role.description }}</p>
            </div>
            <div class="expand-icon">
              <lucide-icon [name]="expandedRole === role.id ? 'chevron-up' : 'chevron-down'" class="chevron"></lucide-icon>
            </div>
          </div>
          
          <div class="card-body" *ngIf="expandedRole === role.id">
            <ng-container *ngIf="parseText(role.playerGuide) as info">
              <div class="guide-content">
                
                <div class="skill-badge" *ngIf="info.commandName">
                  <lucide-icon name="moon" class="inline-icon"></lucide-icon>
                  <span class="skill-name">Habilidad Nocturna:</span>
                  <span class="skill-cmd">{{ info.commandName }}</span>
                </div>
                
                <p class="skill-desc">{{ info.skillDescription }}</p>

                <div class="win-section" *ngIf="info.winTitle">
                  <div class="win-badge" [ngClass]="info.winType + '-win'">
                    <lucide-icon name="trophy" class="inline-icon"></lucide-icon>
                    {{ info.winTitle }}
                  </div>
                  <p class="win-desc">{{ info.winDescription }}</p>
                </div>

              </div>
            </ng-container>
          </div>
        </div>

        <div class="empty-state" *ngIf="filteredRoles.length === 0">
          <lucide-icon name="ghost" class="empty-icon"></lucide-icon>
          <p>No se encontraron roles con esa búsqueda.</p>
        </div>
      </div>
    </ion-content>
  </div>
</div>
